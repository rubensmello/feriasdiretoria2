<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>besmart. - Gestor de Férias</title>
  
  <!-- Tailwind CSS para o visual -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React e ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel para traduzir o código React no navegador -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase (Bibliotecas para a Nuvem) -->
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Sistema de Ícones ---
    const Icon = ({ name, className }) => {
      const paths = {
        UserPlus: <><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><line x1="19" y1="8" x2="19" y2="14"/><line x1="22" y1="11" x2="16" y2="11"/></>,
        AlertCircle: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>,
        CheckCircle: <><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></>,
        Clock: <><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>,
        Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>,
        Briefcase: <><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></>,
        CalendarDays: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></>,
        Trash2: <><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>,
        Edit2: <><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></>,
        Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        X: <><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>,
        Info: <><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>,
        Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>,
        FolderUp: <><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><polyline points="9 14 12 11 15 14"/></>,
        Cloud: <><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></>,
        CloudOff: <><path d="m2 2 20 20"/><path d="M5.78 10.21a4.33 4.33 0 0 0 3.22 8.79h8.5a4.5 4.5 0 0 0 2.86-1.06"/><path d="M21.53 16.27A4.5 4.5 0 0 0 17.5 10h-1.79A7 7 0 0 0 5.09 5.51"/></>
      };
      return (
        <svg className={className} xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          {paths[name]}
        </svg>
      );
    };

    function App() {
      // ---------------------------------------------------------
      // PASSO 6: COLE SUAS CHAVES DO FIREBASE AQUI ABAIXO
      // (Se não colar, o sistema funcionará apenas no seu PC)
      // ---------------------------------------------------------
      const firebaseConfig = {
        apiKey: "AIzaSyDP_eaIhct5a14ObWLWdyHUSL9q8gvGp68",
        authDomain: "besmart-ferias.firebaseapp.com",
        projectId: "besmart-ferias",
        storageBucket: "besmart-ferias.firebasestorage.app",
        messagingSenderId: "53178684936",
        appId: "1:53178684936:web:0095d1d9f222159ef1a3bd"
      };

      const isCloudConfigured = !firebaseConfig.apiKey.includes("AIzaSyDP_eaIhct5a14ObWLWdyHUSL9q8gvGp68");

      const [employees, setEmployees] = useState([]);
      const [isPptxLoaded, setIsPptxLoaded] = useState(false);
      const [toast, setToast] = useState(null); // Sistema de Notificações
      const fileInputRef = useRef(null);

      const initialFormState = { id: null, name: '', role: '', department: 'Operacional', admissionDate: '', hasTakenVacation: false, lastVacationEnd: '', plannedPeriods: [{ start: '', end: '' }] };
      const [formData, setFormData] = useState(initialFormState);

      const showMessage = (msg, type = 'success') => {
        setToast({ msg, type });
        setTimeout(() => setToast(null), 4000);
      };

      // Inicialização
      useEffect(() => {
        // Carrega PPTX
        const loadScript = src => new Promise((resolve, reject) => { const s = document.createElement('script'); s.src = src; s.onload = resolve; s.onerror = reject; document.head.appendChild(s); });
        const initPptx = async () => { try { if (!window.JSZip) await loadScript('https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/libs/jszip.min.js'); if (!window.PptxGenJS) await loadScript('https://cdn.jsdelivr.net/gh/gitbrent/pptxgenjs@3.12.0/dist/pptxgen.min.js'); setIsPptxLoaded(true); } catch (e) { console.error(e); } };
        initPptx();

        // Configura Banco de Dados (Nuvem ou Local)
        if (isCloudConfigured) {
          if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
          const db = firebase.firestore();
          // Escuta dados em tempo real da nuvem
          const unsubscribe = db.collection('colaboradores').onSnapshot((snapshot) => {
            const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            setEmployees(data);
          }, (err) => {
            console.error("Erro na nuvem:", err);
            showMessage("Erro de permissão no Firebase. Verifique se o banco está no 'Modo de Teste'.", "error");
          });
          return () => unsubscribe();
        } else {
          // Fallback para Memória Local se a nuvem não estiver configurada
          const saved = localStorage.getItem('besmart_vacations');
          if (saved) {
            try {
              const parsed = JSON.parse(saved);
              setEmployees(parsed.map(e => ({ ...e, id: e.id || Date.now().toString(36) + Math.random().toString(36).substring(2) })));
            } catch(e) {}
          }
        }
      }, []);

      // Salva localmente caso a nuvem NÃO esteja ativa
      useEffect(() => {
        if (!isCloudConfigured) localStorage.setItem('besmart_vacations', JSON.stringify(employees));
      }, [employees, isCloudConfigured]);

      // Regras de Negócio e Cálculos
      const calculateDeadline = (admDate, lastVacEnd) => {
        const adm = new Date(admDate + 'T12:00:00Z');
        let nextFinishDeadline = new Date(adm.getFullYear() + 2, adm.getMonth(), adm.getDate());
        if (lastVacEnd) {
          const last = new Date(lastVacEnd + 'T12:00:00Z');
          while (nextFinishDeadline.getTime() <= last.getTime() + (180 * 24 * 60 * 60 * 1000)) { nextFinishDeadline.setFullYear(nextFinishDeadline.getFullYear() + 1); }
        }
        const nextStartDeadline = new Date(nextFinishDeadline);
        nextStartDeadline.setDate(nextStartDeadline.getDate() - 30);
        return { startDeadline: nextStartDeadline, finishDeadline: nextFinishDeadline };
      };

      const calculateDays = (startStr, endStr) => {
        if (!startStr || !endStr) return 0;
        return Math.ceil((new Date(endStr + 'T12:00:00Z').getTime() - new Date(startStr + 'T12:00:00Z').getTime()) / (1000 * 60 * 60 * 24)) + 1;
      };

      const getStatus = (date) => {
        const diffDays = Math.ceil((date.getTime() - new Date().getTime()) / (1000 * 60 * 60 * 24));
        if (diffDays < 0) return { label: 'Atrasado', color: 'text-red-600', bg: 'bg-red-100', iconName: 'AlertCircle' };
        if (diffDays <= 90) return { label: 'Atenção (Vence em breve)', color: 'text-orange-600', bg: 'bg-orange-100', iconName: 'Clock' };
        return { label: 'Em dia', color: 'text-emerald-600', bg: 'bg-emerald-100', iconName: 'CheckCircle' };
      };

      // Form Handlers
      const handleInputChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.type === 'checkbox' ? e.target.checked : e.target.value });
      
      const handlePeriodChange = (index, field, value) => {
        const newPeriods = [...formData.plannedPeriods];
        newPeriods[index] = { ...newPeriods[index], [field]: value };
        if (field === 'start' && value && formData.plannedPeriods.length === 1) {
          const s = new Date(value + 'T12:00:00Z');
          if (!isNaN(s.getTime())) { s.setDate(s.getDate() + 29); newPeriods[index].end = s.toISOString().split('T')[0]; }
        }
        setFormData({ ...formData, plannedPeriods: newPeriods });
      };

      const addPeriod = () => formData.plannedPeriods.length < 3 && setFormData({ ...formData, plannedPeriods: [...formData.plannedPeriods, { start: '', end: '' }] });
      const removePeriod = (index) => setFormData({ ...formData, plannedPeriods: formData.plannedPeriods.filter((_, i) => i !== index) });

      const handleSubmit = async (e) => {
        e.preventDefault();
        const { startDeadline, finishDeadline } = calculateDeadline(formData.admissionDate, formData.hasTakenVacation ? formData.lastVacationEnd : null);
        const safeId = Date.now().toString(36) + Math.random().toString(36).substring(2);
        
        const empData = {
          ...formData,
          id: formData.id || safeId,
          deadlineStart: startDeadline.toISOString(),
          deadlineFinish: finishDeadline.toISOString()
        };

        if (isCloudConfigured) {
          try {
            await firebase.firestore().collection('colaboradores').doc(empData.id).set(empData);
            showMessage("Salvo na nuvem com sucesso!");
          } catch (err) { showMessage("Erro ao salvar na nuvem.", "error"); }
        } else {
          setEmployees(formData.id ? employees.map(emp => emp.id === formData.id ? empData : emp) : [...employees, empData]);
          showMessage("Salvo localmente com sucesso!");
        }
        setFormData(initialFormState);
      };

      const removeEmployee = async (id) => {
        if (isCloudConfigured) {
          try {
            await firebase.firestore().collection('colaboradores').doc(id).delete();
            showMessage("Excluído da nuvem!");
          } catch (err) { showMessage("Erro ao excluir da nuvem.", "error"); }
        } else {
          setEmployees(employees.filter(emp => emp.id !== id));
          showMessage("Excluído localmente.");
        }
      };

      const handleEdit = (emp) => setFormData({ ...emp, plannedPeriods: emp.plannedPeriods?.length ? emp.plannedPeriods : [{ start: emp.plannedStart || '', end: emp.plannedEnd || '' }] });

      // Backups
      const exportBackup = () => {
        const a = document.createElement('a');
        a.href = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(employees));
        a.download = "besmart_ferias_backup.json";
        a.click();
        showMessage("Backup salvo no seu computador.");
      };

      const importBackup = (e) => {
        const fr = new FileReader();
        fr.onload = ev => {
          try {
            const parsed = JSON.parse(ev.target.result);
            if (Array.isArray(parsed)) {
              const validData = parsed.map(emp => ({ ...emp, id: emp.id || Date.now().toString(36) + Math.random().toString(36).substring(2) }));
              if (isCloudConfigured) {
                 validData.forEach(async (emp) => await firebase.firestore().collection('colaboradores').doc(emp.id).set(emp));
                 showMessage("Dados do backup subidos para a nuvem!");
              } else {
                 setEmployees(validData);
                 showMessage("Dados importados localmente!");
              }
            } else throw new Error();
          } catch (err) { showMessage("Formato de arquivo inválido.", "error"); }
        };
        if (e.target.files[0]) fr.readAsText(e.target.files[0]);
        e.target.value = '';
      };

      // PPTX
      const exportPPTX = () => {
        if (!window.PptxGenJS) return showMessage("Biblioteca carregando, tente de novo em breve", "error");
        const pres = new window.PptxGenJS();
        
        // Slide 1
        const slide = pres.addSlide();
        slide.background = { color: "F3F4F6" };
        slide.addShape(pres.ShapeType.rect, { x: 0, y: 0, w: "100%", h: 0.8, fill: { color: "8B5CF6" } });
        slide.addText("besmart. - Diretoria 2", { x: 0.5, y: 0.1, w: 5, h: 0.6, fontSize: 18, color: "FFFFFF", bold: true });
        slide.addText("Cronograma de Férias da Equipe", { x: 0.5, y: 1.0, w: 8, fontSize: 22, color: "374151", bold: true });

        const rows = employees.map(emp => {
          const limitStr = new Date(emp.deadlineStart).toLocaleDateString('pt-BR');
          const validP = (emp.plannedPeriods || []).filter(p => p.start && p.end);
          const planStr = validP.length > 0 ? validP.map(p => `${new Date(p.start+'T12:00:00Z').toLocaleDateString('pt-BR')} a ${new Date(p.end+'T12:00:00Z').toLocaleDateString('pt-BR')} (${calculateDays(p.start, p.end)}d)`).join('\n') : "Não planejado";
          return [emp.name, `${emp.role} (${emp.department || 'Op.'})`, limitStr, planStr];
        });
        slide.addTable([
          [{ text: "Colaborador", options: { fill: "8B5CF6", color: "FFFFFF", bold: true } }, { text: "Função", options: { fill: "8B5CF6", color: "FFFFFF", bold: true } }, { text: "Limite Início (CLT)", options: { fill: "8B5CF6", color: "FFFFFF", bold: true } }, { text: "Férias Planejadas", options: { fill: "8B5CF6", color: "FFFFFF", bold: true } }],
          ...rows
        ], { x: 0.5, y: 1.8, w: 9, colW: [2.5, 2.5, 2.0, 2.0], border: { pt: 1, color: "E5E7EB" }, fill: "FFFFFF", fontSize: 12 });

        // Slide 2
        const slide2 = pres.addSlide();
        slide2.background = { color: "F3F4F6" };
        slide2.addShape(pres.ShapeType.rect, { x: 0, y: 0, w: "100%", h: 0.8, fill: { color: "8B5CF6" } });
        slide2.addText("besmart. - Diretoria 2", { x: 0.5, y: 0.1, w: 5, h: 0.6, fontSize: 18, color: "FFFFFF", bold: true });
        slide2.addText("Visualização do Cronograma", { x: 0.5, y: 1.0, w: 8, fontSize: 22, color: "374151", bold: true });

        const monthsLabels = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
        const tRows = employees.map(emp => [
          { text: emp.name, options: { bold: true, fill: "FFFFFF" } },
          ...monthsLabels.map((_, mIdx) => ({ text: "", options: { fill: ((emp.plannedPeriods||[]).some(p => { if(!p.start||!p.end)return false; const s=new Date(p.start+'T12:00:00Z'); const e=new Date(p.end+'T12:00:00Z'); const mS=new Date(s.getFullYear(), mIdx, 1); const mE=new Date(s.getFullYear(), mIdx+1, 0); return s<=mE && e>=mS; })) ? "C4B5FD" : "FFFFFF" } }))
        ]);
        slide2.addTable([
          [{ text: "Colaborador", options: { fill: "8B5CF6", color: "FFFFFF", bold: true } }, ...monthsLabels.map(m => ({ text: m, options: { fill: "8B5CF6", color: "FFFFFF", bold: true, align: "center" } }))],
          ...tRows
        ], { x: 0.5, y: 1.8, w: 9, colW: [2.2, ...Array(12).fill(0.56)], border: { pt: 1, color: "E5E7EB" }, fontSize: 10 });
        pres.writeFile({ fileName: "Besmart_Cronograma_Ferias_D2.pptx" });
        showMessage("Relatório PPTX gerado!");
      };

      const months = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
      const checkOverlap = (mIdx, periods) => (periods||[]).some(p => { if(!p.start||!p.end)return false; const s=new Date(p.start+'T12:00:00Z'), e=new Date(p.end+'T12:00:00Z'), mS=new Date(s.getFullYear(),mIdx,1), mE=new Date(s.getFullYear(),mIdx+1,0); return s<=mE && e>=mS; });

      return (
        <div className="min-h-screen bg-gray-50 font-sans text-gray-800 pb-10 relative">
          {/* Toast Notification */}
          {toast && (
            <div className={`fixed bottom-6 right-6 px-6 py-3 rounded-lg shadow-lg font-medium text-white transition-opacity z-50 flex items-center ${toast.type === 'error' ? 'bg-red-500' : 'bg-emerald-500'}`}>
              <Icon name={toast.type === 'error' ? 'AlertCircle' : 'CheckCircle'} className="w-5 h-5 mr-2" />
              {toast.msg}
            </div>
          )}

          <header className="bg-[#8b5cf6] text-white shadow-md">
            <div className="max-w-7xl mx-auto px-4 py-4 flex flex-col lg:flex-row justify-between items-center gap-4">
              <div className="flex items-center space-x-2">
                <div className="flex items-center text-3xl font-extrabold tracking-tight">
                  <span>be.</span><span className="font-medium">smart</span>
                  <div className="ml-2 grid grid-cols-2 gap-0.5"><div className="w-4 h-4 bg-white rounded-tl-full"></div><div className="w-4 h-4"></div><div className="w-4 h-4"></div><div className="w-4 h-4 bg-white rounded-br-full"></div></div>
                </div>
                <h1 className="text-xl font-medium hidden md:block border-l border-white/30 pl-4 ml-4">Gestor de Férias - Diretoria 2</h1>
              </div>
              
              <div className="flex flex-wrap justify-center items-center gap-4">
                {/* Indicador de Nuvem */}
                <div className={`flex items-center px-3 py-1.5 rounded-full text-xs font-bold border ${isCloudConfigured ? 'bg-emerald-500/20 text-emerald-100 border-emerald-400/30' : 'bg-orange-500/20 text-orange-100 border-orange-400/30'}`} title={isCloudConfigured ? "Banco de dados sincronizado em tempo real" : "Configuração pendente. Salvando apenas no navegador atual."}>
                  <Icon name={isCloudConfigured ? "Cloud" : "CloudOff"} className="w-4 h-4 mr-2" />
                  {isCloudConfigured ? 'Nuvem Ativa' : 'Local Apenas'}
                </div>

                <div className="flex items-center space-x-4 bg-white/10 px-4 py-2 rounded-lg border border-white/20">
                  <input type="file" accept=".json" style={{display: 'none'}} ref={fileInputRef} onChange={importBackup} />
                  <button onClick={() => fileInputRef.current.click()} className="flex items-center text-sm font-medium hover:text-violet-200 transition-colors"><Icon name="FolderUp" className="w-4 h-4 mr-2" /> Importar</button>
                  <div className="w-px h-4 bg-white/30"></div>
                  <button onClick={exportBackup} className="flex items-center text-sm font-medium hover:text-violet-200 transition-colors"><Icon name="Save" className="w-4 h-4 mr-2" /> Fazer Backup</button>
                </div>
              </div>
            </div>
          </header>

          <main className="max-w-7xl mx-auto px-4 py-8 space-y-8">
            <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 flex items-start text-blue-800 shadow-sm">
              <Icon name="Info" className="w-6 h-6 mr-3 flex-shrink-0 mt-0.5 text-blue-600" />
              <div className="text-sm">
                <h3 className="font-bold mb-1 text-base">Regras de Férias (CLT)</h3>
                <p className="mb-2">O colaborador ganha o direito após 12 meses (<strong>Aquisitivo</strong>) e deve usufruir nos 12 seguintes (<strong>Concessivo</strong>).</p>
                <p className="mb-2 text-blue-900 font-medium">O período MÁXIMO para iniciar as férias é garantido calculando 30 dias de recuo do fim do concessivo, evitando multa.</p>
                <p>Permitido fracionar em até 3 períodos (um com mín. 14 dias, outros mín. 5 dias). Início proibido 2 dias antes de feriados ou DSR.</p>
              </div>
            </div>

            <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-1">
                <div className="flex justify-between items-center mb-4">
                  <h2 className="text-lg font-bold text-gray-800 flex items-center"><Icon name="UserPlus" className="w-5 h-5 mr-2 text-violet-500" />{formData.id ? 'Editar Colaborador' : 'Adicionar Colaborador'}</h2>
                  {formData.id && <button type="button" onClick={() => setFormData(initialFormState)} className="text-sm text-violet-600 font-medium hover:underline">Cancelar</button>}
                </div>
                <form onSubmit={handleSubmit} className="space-y-4">
                  <div><label className="block text-sm font-medium text-gray-700 mb-1">Nome Completo</label><input required type="text" name="name" value={formData.name} onChange={handleInputChange} className="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-violet-500" /></div>
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="block text-sm font-medium text-gray-700 mb-1">Cargo</label><input required type="text" name="role" value={formData.role} onChange={handleInputChange} className="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-violet-500" /></div>
                    <div><label className="block text-sm font-medium text-gray-700 mb-1">Setor</label><select name="department" value={formData.department} onChange={handleInputChange} className="w-full px-3 py-2 border rounded-md bg-white focus:ring-2 focus:ring-violet-500"><option>Operacional</option><option>Comercial</option></select></div>
                  </div>
                  <div><label className="block text-sm font-medium text-gray-700 mb-1">Data de Admissão</label><input required type="date" name="admissionDate" value={formData.admissionDate} onChange={handleInputChange} className="w-full px-3 py-2 border rounded-md focus:ring-2 focus:ring-violet-500" /></div>
                  <div className="flex items-center py-2"><input type="checkbox" name="hasTakenVacation" id="hasTaken" checked={formData.hasTakenVacation} onChange={handleInputChange} className="w-4 h-4 text-violet-600 border-gray-300 rounded" /><label htmlFor="hasTaken" className="ml-2 text-sm text-gray-700">Já tirou férias anteriormente?</label></div>
                  {formData.hasTakenVacation && <div className="bg-violet-50 p-3 rounded-md border border-violet-100"><label className="block text-sm font-medium text-violet-800 mb-1">Fim das Últimas Férias</label><input required={formData.hasTakenVacation} type="date" name="lastVacationEnd" value={formData.lastVacationEnd} onChange={handleInputChange} className="w-full px-3 py-2 border border-violet-300 rounded-md bg-white" /></div>}
                  <hr className="border-gray-200" />
                  <div>
                    <div className="flex justify-between items-center mb-2"><label className="block text-sm font-bold text-gray-700">Agendar Férias</label>{formData.plannedPeriods.length < 3 && <button type="button" onClick={addPeriod} className="text-xs bg-violet-100 text-violet-700 px-2 py-1 rounded font-medium flex items-center"><Icon name="Plus" className="w-3 h-3 mr-1" /> Fracionar</button>}</div>
                    {formData.plannedPeriods.map((period, i) => (
                      <div key={i} className="grid grid-cols-12 gap-2 mb-2 items-end bg-gray-50 p-2 rounded border relative">
                        {formData.plannedPeriods.length > 1 && <button type="button" onClick={() => removePeriod(i)} className="absolute -top-2 -right-2 bg-red-100 text-red-600 rounded-full p-1"><Icon name="X" className="w-3 h-3" /></button>}
                        <div className="col-span-6"><label className="block text-xs text-gray-500 mb-1">Início</label><input type="date" value={period.start} onChange={(e) => handlePeriodChange(i, 'start', e.target.value)} className="w-full px-2 py-2 text-sm border rounded-md bg-white" /></div>
                        <div className="col-span-6"><label className="block text-xs text-gray-500 mb-1">Fim</label><input type="date" value={period.end} onChange={(e) => handlePeriodChange(i, 'end', e.target.value)} className="w-full px-2 py-2 text-sm border rounded-md bg-white" /></div>
                      </div>
                    ))}
                  </div>
                  <button type="submit" className="w-full bg-violet-600 hover:bg-violet-700 text-white font-medium py-2.5 px-4 rounded-md flex justify-center items-center">{formData.id ? <><Icon name="Edit2" className="w-4 h-4 mr-2" /> Atualizar</> : 'Salvar Colaborador'}</button>
                </form>
              </div>

              <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 lg:col-span-2 overflow-hidden flex flex-col">
                <div className="flex justify-between items-center mb-4"><h2 className="text-lg font-bold text-gray-800 flex items-center"><Icon name="Briefcase" className="w-5 h-5 mr-2 text-violet-500" /> Equipe & Prazos (CLT)</h2><span className="bg-violet-100 text-violet-800 text-xs px-2 py-1 rounded-full">{employees.length}</span></div>
                <div className="overflow-x-auto flex-1">
                  <table className="w-full text-left border-collapse">
                    <thead><tr className="bg-gray-50 text-gray-600 text-sm border-b"><th className="py-3 px-4">Colaborador</th><th className="py-3 px-4">Admissão</th><th className="py-3 px-4">Limite Início (30d)</th><th className="py-3 px-4">Status</th><th className="py-3 px-4">Ações</th></tr></thead>
                    <tbody className="divide-y divide-gray-100 text-sm">
                      {employees.length === 0 ? <tr><td colSpan="5" className="text-center py-8 text-gray-400">Nenhum colaborador.</td></tr> : employees.map(emp => {
                        const status = getStatus(new Date(emp.deadlineStart));
                        return (
                          <tr key={emp.id} className="hover:bg-gray-50"><td className="py-3 px-4 font-medium text-gray-900">{emp.name}<div className="text-xs text-gray-500 flex gap-1 mt-0.5"><span>{emp.role}</span><span className="w-1 h-1 bg-gray-300 rounded-full self-center"></span><span className={emp.department === 'Comercial' ? 'text-blue-600' : 'text-orange-600'}>{emp.department || 'Op.'}</span></div></td><td className="py-3 px-4 text-gray-600">{new Date(emp.admissionDate + 'T12:00:00Z').toLocaleDateString('pt-BR')}</td><td className="py-3 px-4 font-medium text-gray-800">{new Date(emp.deadlineStart).toLocaleDateString('pt-BR')}</td><td className="py-3 px-4"><span className={`inline-flex items-center px-2 py-1 rounded-full text-xs font-medium ${status.bg} ${status.color}`}><Icon name={status.iconName} className="w-3 h-3 mr-1" />{status.label}</span></td><td className="py-3 px-4"><div className="flex space-x-3"><button onClick={() => handleEdit(emp)} className="text-gray-400 hover:text-blue-600"><Icon name="Edit2" className="w-4 h-4" /></button><button onClick={() => removeEmployee(emp.id)} className="text-gray-400 hover:text-red-600"><Icon name="Trash2" className="w-4 h-4" /></button></div></td></tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>

            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100">
              <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
                <h2 className="text-lg font-bold text-gray-800 flex items-center"><Icon name="CalendarDays" className="w-5 h-5 mr-2 text-violet-500" /> Cronograma de Férias</h2>
                <button onClick={exportPPTX} disabled={!isPptxLoaded} className="mt-4 md:mt-0 flex items-center px-4 py-2 bg-gray-900 hover:bg-gray-800 text-white text-sm font-medium rounded-md"><Icon name="Download" className="w-4 h-4 mr-2" /> Gerar Relatório PPTX</button>
              </div>
              <div className="overflow-x-auto">
                <table className="w-full min-w-[800px] border-collapse">
                  <thead><tr><th className="p-2 border bg-gray-50 text-left text-xs text-gray-500 uppercase w-48">Colaborador</th><th className="p-2 border bg-gray-50 text-left text-xs text-gray-500 uppercase w-56">Períodos (Dias)</th>{months.map(m => <th key={m} className="p-2 border bg-gray-50 text-center text-xs text-gray-500 uppercase">{m}</th>)}</tr></thead>
                  <tbody>
                    {employees.map(emp => (
                      <tr key={emp.id}>
                        <td className="p-2 border text-sm font-medium">{emp.name}<div className="text-[10px] text-gray-500">{emp.role}</div></td>
                        <td className="p-2 border text-xs text-gray-600 bg-gray-50/50">
                          {(() => {
                            const vP = (emp.plannedPeriods || []).filter(p => p.start && p.end);
                            if (vP.length === 0) return <span className="text-gray-400 italic">Sem agendamento</span>;
                            return vP.map((p, i) => <div key={i} className="py-0.5">{new Date(p.start+'T12:00:00Z').toLocaleDateString('pt-BR')} até {new Date(p.end+'T12:00:00Z').toLocaleDateString('pt-BR')} <span className="font-semibold text-violet-700">({calculateDays(p.start, p.end)}d)</span></div>);
                          })()}
                        </td>
                        {months.map((_, i) => <td key={i} className="p-1 border relative">{checkOverlap(i, emp.plannedPeriods) && <div className="absolute inset-1 bg-violet-400/80 rounded-sm"></div>}</td>)}
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            </div>
          </main>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
